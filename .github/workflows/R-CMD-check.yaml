name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  R-CMD-check:
    runs-on: macos-latest
    env:
      GRADEPATH_BACKEND: highs
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install dependencies
        shell: Rscript {0}
        run: |
          install.packages(c(
            "remotes",
            "rcmdcheck",
            "testthat",
            "devtools",
            "digest",
            "ROI",
            "ROI.plugin.highs",
            "ROI.plugin.glpk",
            "callr",
            "highs",
            "jsonlite",
            "Matrix",
            "slam",
            "knitr",
            "rmarkdown"
          ))
          remotes::install_deps(
            dependencies = c("Depends", "Imports", "LinkingTo"),
            upgrade = "never"
          )

      - name: Check
        shell: Rscript {0}
        run: |
          rcmdcheck::rcmdcheck(
            args = c("--no-manual", "--no-build-vignettes", "--no-vignettes"),
            error_on = "warning",
            check_dir = "check"
          )
